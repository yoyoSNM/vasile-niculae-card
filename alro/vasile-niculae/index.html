<style>

*{
margin:0;
padding:0;
box-sizing:border-box
}

body{
font-family:'IBM Plex Sans',sans-serif;
background:#eef2f5;
color:#111;
overflow-x:hidden
}

.hero{
background:linear-gradient(180deg,#0d3b66,#00b894);
padding:24px 20px 34px;
text-align:center;
color:#fff;
position:relative;
overflow:hidden;
}

.hero-pattern{
position:absolute;

left:50%;
top:48%;

transform:translate(-50%,-50%);

width:1200px;

z-index:0;

pointer-events:none;
}

.hero img,
.hero h1,
.hero h2,
.hero .btns{
position:relative;
z-index:2;
}
  
.avatar{
width:160px;
height:160px;
border-radius:50%;
border:6px solid #fff;
object-fit:cover;
box-shadow:0 10px 30px rgba(0,0,0,.25)
}

h1{
margin-top:20px;
font-size:44px;
font-weight:500;
letter-spacing:-1px
}

h2{
margin-top:12px;
font-size:22px;
font-weight:400;
opacity:.88
}

.card{
max-width:820px;
margin:-18px auto 30px;
background:#fff;
border-radius:28px;
padding:40px;
box-shadow:0 20px 60px rgba(0,0,0,.10)
}

.row{
padding:22px 0;
border-bottom:1px solid #e8edf2
}

.label{
font-size:13px;
color:#7c8492;
font-weight:500;
letter-spacing:.2px
}

.value{
font-size:20px;
margin-top:4px;
font-weight:400;
line-height:1.45;
color:#16181d
}

.value a{
color:inherit !important;
text-decoration:none !important;
transition:.2s;
display:inline-block;
}

.value a:hover{
opacity:.7
}

.value a:visited{
color:inherit !important;
text-decoration:none !important;
}
  
.btns{
display:flex;
gap:18px;
justify-content:center;
margin-top:35px;
flex-wrap:wrap
}

.btn{
background:#00b894;
color:#fff;
padding:14px 24px;
border-radius:14px;
text-decoration:none;
font-size:17px;
font-weight:500;
letter-spacing:.1px;
transition:.2s;
box-shadow:0 8px 20px rgba(0,0,0,.10)
}

.btn:hover{
transform:translateY(-2px)
}

.footer{
text-align:center;
padding:8px 0 20px;
color:#7b8492;
font-size:13px
}

.qr{
margin:40px auto 0;
width:220px;
height:220px;
background:#fff;
border-radius:24px;
padding:10px
}

.subtitle{
font-size:.62em;
opacity:.72;
font-weight:400;
display:block;
margin-top:8px;
letter-spacing:.2px;
}  

@media(max-width:700px){

h1{
font-size:36px
}

h2{
font-size:20px
}

.subtitle{
font-size:.58em;
}
  

.value{
font-size:19px
}

.card{
margin:-28px 14px 20px;
padding:24px
}

.btn{
font-size:16px;
padding:14px 22px
}

}

</style>
</head>
