<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bayo</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f5f7fa;
      color:#111;
    }

    .hero{
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      background:linear-gradient(135deg,#0b2c4d,#00c6a2);
      color:white;
      padding:20px;
    }

    h1{
      font-size:64px;
      margin-bottom:10px;
    }

    h2{
      font-size:28px;
      font-weight:400;
      max-width:700px;
      line-height:1.4;
    }

    .button{
      margin-top:40px;
      padding:16px 32px;
      background:white;
      color:#0b2c4d;
      text-decoration:none;
      border-radius:12px;
      font-weight:bold;
      transition:0.2s;
    }

    .button:hover{
      transform:translateY(-2px);
    }
  </style>
</head>

<body>

  <section class="hero">
    <h1>Bayo</h1>

    <h2>
      Modern Business Identity
    </h2>

    <a class="button"
       href="/alro/vasile-niculae">
       View Demo
    </a>
  </section>

</body>
</html>
